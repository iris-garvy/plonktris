[package]
name = "plonktris-server"
version = "0.1.0"
edition = "2021"

[dependencies]
circuit = { path = "../circuit" }
axum = "0.7"
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.7", features = ["postgres", "runtime-tokio", "uuid"] }
uuid = { version = "1", features = ["v4"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"