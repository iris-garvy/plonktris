# fly.toml app configuration file generated for plonktris-server on 2026-06-13T17:59:54-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'plonktris-server'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  BIND_ADDR = '0.0.0.0:3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  # proof generation peaks ~2GB; 4GB gives headroom. extra cpus speed up the
  # parallel (rayon) prover.
  size = 'shared-cpu-2x'
  memory = '4gb'
